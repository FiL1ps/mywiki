        th, td {

            text-align: center;
            min-width: 80px;
        }
        
        th {

        tr:nth-child(even) {
            background-color: #f9f9f9;

                "G": "玉树藏族自治州",
                "H": "海西蒙古族藏族自治州"
            },
            "宁": {
                "A": "银川市",
                "B": "石嘴山市",
                "C": "吴忠市",
                "D": "固原市",
                "E": "中卫市"
            },
            "新": {
                "A": "乌鲁木齐市",
                "B": "昌吉回族自治州",
                "C": "石河子市",
                "D": "奎屯市",
                "E": "博尔塔拉蒙古自治州",
                "F": "伊犁哈萨克自治州",
                "G": "塔城地区",
                "H": "阿勒泰地区",
                "J": "克拉玛依市",
                "K": "吐鲁番地区",
                "L": "哈密地区",
                "M": "巴音郭楞蒙古自治州",
                "N": "阿克苏地区",
                "P": "克孜勒苏柯尔克孜自治州",
                "Q": "喀什地区",
                "R": "和田地区"
            }
        };
        
        // 省份列表
        const provinces = ["京", "津", "冀", "晋", "蒙", "辽", "吉", "黑", "沪", "苏", "浙", "皖", "闽", "赣", "鲁", "豫", "鄂", "湘", "粤", "桂", "琼", "渝", "川", "贵", "云", "藏", "陕", "甘", "青", "宁", "新"];
        
        // 字母列表
        const letters = ["A", "B", "C", "D", "E", "F", "G", "H", "J", "K", "L", "M", "N", "P", "Q", "R", "S", "T", "U", "V", "W", "X", "Y", "Z"];
        
        // 生成表格
        function generateTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            provinces.forEach(province => {
                const row = document.createElement('tr');
                
                // 省份列
                const provinceCell = document.createElement('td');
                provinceCell.textContent = province;
                provinceCell.style.fontWeight = 'bold'; // 加粗
                row.appendChild(provinceCell);
                
                // 字母列
                const isMunicipality = ['京', '津', '沪', '渝'].includes(province);
                
                if (isMunicipality) {
                    // 直辖市合并单元格
                    const mergedCell = document.createElement('td');
                    mergedCell.colSpan = letters.length;
                    mergedCell.textContent = plateData[province]['A'] || '';
                    mergedCell.id = `${province}-A`;
                    row.appendChild(mergedCell);
                } else {
                    // 普通省份
                    letters.forEach(letter => {
                        const cell = document.createElement('td');
                        cell.id = `${province}-${letter}`;
                        cell.textContent = plateData[province][letter] || '';
                        row.appendChild(cell);
                    });
                }
                
                tableBody.appendChild(row);
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            generateTable();
            
            // 查询按钮点击事件
            document.getElementById('searchBtn').addEventListener('click', function() {
                const province = document.getElementById('province').value;
                const letter = document.getElementById('letter').value;
                const errorMessage = document.getElementById('errorMessage');
                
                // 重置高亮
                document.querySelectorAll('td').forEach(cell => {
                    cell.classList.remove('highlight');
                });
                
                // 验证输入
                if (!province || !letter) {
                    errorMessage.textContent = '请输入正确车牌代码';
                    return;
                }
                
                // 检查是否存在对应城市
                if (!plateData[province] || !plateData[province][letter]) {
                    errorMessage.textContent = '请输入正确车牌代码';
                    return;
                }
                
                // 高亮显示
                const isMunicipality = ['京', '津', '沪', '渝'].includes(province);
                let targetCell;
                
                if (isMunicipality) {
                    // 直辖市使用合并单元格的ID
                    targetCell = document.getElementById(`${province}-A`);
                } else {
                    // 普通省份使用对应字母的ID
                    targetCell = document.getElementById(`${province}-${letter}`);
                }
                
                if (targetCell) {
                    targetCell.classList.add('highlight');
                    errorMessage.textContent = '';
                    // 自动滚动到目标单元格
                    targetCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        });
    </script>
</body>
</html>
